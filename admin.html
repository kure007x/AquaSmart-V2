<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSmart-V2 | ระบบหลังบ้าน (Admin)</title>
    <!-- โหลด Tailwind CSS มาใช้ตกแต่งหน้าเว็บ -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10 font-sans">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-3xl font-bold text-blue-600 mb-6 border-b pb-4">🐟 เพิ่มข้อมูลปลาชนิดใหม่</h1>
        
        <!-- ฟอร์มกรอกข้อมูล -->
        <div class="space-y-5">
            <div>
                <label class="block text-gray-700 font-bold mb-2">ชื่อปลา (ภาษาไทย)</label>
                <input type="text" id="fishNameTH" placeholder="เช่น ปลาหมอคางดำ" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-gray-700 font-bold mb-2">ชื่อปลา (ภาษาอังกฤษ / เผื่อทำเป็น ID)</label>
                <input type="text" id="fishNameEN" placeholder="เช่น Blackchin tilapia" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-gray-700 font-bold mb-2">คำอธิบายวิธีเลี้ยงเบื้องต้น</label>
                <textarea id="fishDescription" rows="4" placeholder="กรอกข้อมูลลักษณะนิสัยหรือการดูแล..." class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <div>
                <label class="block text-gray-700 font-bold mb-2">อัปโหลดรูปภาพตัวอย่างปลา</label>
                <input type="file" id="fishImageFile" accept="image/*" class="w-full text-gray-700 p-2 border rounded-lg bg-gray-50">
            </div>

            <button id="btnSave" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg mt-4 transition duration-300">
                💾 บันทึกข้อมูลลงฐานข้อมูล
            </button>
        </div>
    </div>

    <!-- เตรียมพื้นที่เขียน JavaScript ดันข้อมูลขึ้น Firebase -->
    <script type="module">
        // เดี๋ยวเราจะเอาโค้ด Firebase มาใส่ตรงนี้!
    </script>

</body>
</html>
