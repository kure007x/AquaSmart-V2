<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSmart-V2 | ระบบหลังบ้าน (Admin)</title>
    <!-- โหลด Tailwind CSS มาใช้ตกแต่งหน้าเว็บ -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10 font-sans">

    <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-3xl font-bold text-blue-600 mb-6 border-b pb-4">🐟 เพิ่มข้อมูลปลาชนิดใหม่</h1>
        
        <!-- ฟอร์มกรอกข้อมูล -->
        <div class="space-y-5">
            <div>
                <label class="block text-gray-700 font-bold mb-2">ชื่อปลา (ภาษาไทย)</label>
                <input type="text" id="fishNameTH" placeholder="เช่น ปลาหมอคางดำ" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-gray-700 font-bold mb-2">ชื่อปลา (ภาษาอังกฤษ / เผื่อทำเป็น ID)</label>
                <input type="text" id="fishNameEN" placeholder="เช่น blackchin_tilapia" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
                <label class="block text-gray-700 font-bold mb-2">คำอธิบายวิธีเลี้ยงเบื้องต้น</label>
                <textarea id="fishDescription" rows="4" placeholder="กรอกข้อมูลลักษณะนิสัยหรือการดูแล..." class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>

            <div>
                <label class="block text-gray-700 font-bold mb-2">อัปโหลดรูปภาพตัวอย่างปลา</label>
                <input type="file" id="fishImageFile" accept="image/*" class="w-full text-gray-700 p-2 border rounded-lg bg-gray-50">
            </div>

            <button id="btnSave" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg mt-4 transition duration-300">
                💾 บันทึกข้อมูลลงฐานข้อมูล
            </button>
        </div>
    </div>

    <!-- โค้ด JavaScript สำหรับเชื่อมต่อ Firebase ต้องอยู่ข้างในแท็ก script แบบนี้ครับ -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js";

        // 🚨 กูเร่! อย่าลืมเอา API Key ของโปรเจกต์นายมาใส่ตรงนี้ใหม่นะ!
        const firebaseConfig = {
            apiKey: "ใส่_API_KEY_ของนายตรงนี้", 
            authDomain: "aquasmart-v2.firebaseapp.com",
            projectId: "aquasmart-v2",
            storageBucket: "aquasmart-v2.firebasestorage.app",
            messagingSenderId: "482478104079",
            appId: "ใส่_APP_ID_ของนายตรงนี้"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        document.getElementById('btnSave').addEventListener('click', async () => {
            const nameTH = document.getElementById('fishNameTH').value;
            const nameEN = document.getElementById('fishNameEN').value;
            const description = document.getElementById('fishDescription').value;
            const imageFile = document.getElementById('fishImageFile').files[0];

            if (!nameTH || !nameEN || !imageFile) {
                alert("กูเร่! กรอกชื่อปลาและเลือกรูปให้ครบก่อนนะ");
                return;
            }

            console.log("เริ่มกระบวนการบันทึก...");
            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.innerText = "⏳ กำลังบันทึก...";

            try {
                const storageRef = ref(storage, 'fish_samples/' + nameEN + '.jpg');
                const uploadTask = await uploadBytes(storageRef, imageFile);
                const imageURL = await getDownloadURL(uploadTask.ref);
                console.log("อัปโหลดรูปสำเร็จ: " + imageURL);

                await setDoc(doc(db, "fish_info", nameEN), {
                    thai_name: nameTH,
                    english_name: nameEN,
                    description: description,
                    image_url: imageURL,
                    updated_at: new Date()
                });

                console.log("บันทึกข้อมูลลงฐานข้อมูลสำเร็จ!");
                alert("✅ บันทึกข้อมูลปลา " + nameTH + " เรียบร้อยแล้ว!");
                location.reload(); 

            } catch (error) {
                console.error("เกิดข้อผิดพลาด:", error);
                alert("❌ บันทึกไม่สำเร็จ: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "💾 บันทึกข้อมูลลงฐานข้อมูล";
            }
        });
    </script>
</body>
</html>
