<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Result - AquaSmart</title>
    <style>
    /* --------------------------------------
       CSS สำหรับกล่องค้นหา (แก้บั๊กกดไม่ได้)
    -------------------------------------- */
    .search-section {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 20px 0;
        width: 100%;
    }

    .search-input-wrapper {
        position: relative;
        flex: 1; /* ขยายเต็มพื้นที่ที่เหลือ */
    }

    /* 🎯 ตัวการสำคัญ: ไอคอนแว่นขยาย */
    .search-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        width: 20px;
        height: 20px;
        color: #9ca3af;
        /* คำสั่งวิเศษ: ปิดการรับคลิก ให้เมาส์ทะลุไปโดนช่องพิมพ์ด้านล่าง! */
        pointer-events: none; 
        z-index: 20;
    }

    /* 🎯 ช่องพิมพ์ข้อความ */
    .search-box {
        width: 100%;
        padding: 14px 16px 14px 48px; /* เว้น Padding ด้านซ้าย 48px หลบแว่นขยาย */
        border: 1px solid #e5e7eb;
        border-radius: 30px;
        font-size: 1rem;
        outline: none;
        background-color: white;
        transition: border-color 0.2s, box-shadow 0.2s;
        
        /* สั่งให้ลอยขึ้นมาให้คลิกได้ */
        position: relative;
        z-index: 10; 
    }

    .search-box:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    /* ปุ่มกล้องสีฟ้า */
    .camera-btn {
        width: 50px;
        height: 50px;
        flex-shrink: 0;
        background-color: #3b82f6;
        border: none;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        transition: transform 0.1s, background-color 0.2s;
    }

    .camera-btn:active {
        transform: scale(0.95);
        background-color: #2563eb;
    }

    .camera-btn svg {
        width: 24px;
        height: 24px;
        stroke: white;
        fill: none;
        stroke-width: 2;
    }
</style>

<!-- --------------------------------------
     HTML สำหรับกล่องค้นหา (เอาไปวางแทนของเดิม)
-------------------------------------- -->
<div class="search-section">
    
    <!-- 1. ส่วนกล่องพิมพ์ข้อความ -->
    <div class="search-input-wrapper">
        <!-- ไอคอนแว่นขยาย -->
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        
        <!-- กล่อง Input ที่เราจะใช้พิมพ์ -->
        <input type="text" id="mainSearchInput" class="search-box" placeholder="ค้นหาชื่อปลา...">
    </div>

    <!-- 2. ปุ่มกล้อง AI สีฟ้า -->
    <button class="camera-btn" onclick="openCamera()">
        <!-- ไอคอนกล้อง -->
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
        </svg>
    </button>

</div>

<script>
    // โค้ดสำหรับดักจับตอนกด Enter เพื่อให้เปลี่ยนหน้าไปที่ result.html
    document.getElementById('mainSearchInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            const query = this.value.trim();
            if (query !== "") {
                // ส่งค่าที่พิมพ์ไปหน้า result.html (สมมติว่าไฟล์นายชื่อ result.html)
                // โดยส่งผ่าน URL Parameter (เช่น result.html?search=ปลานิล)
                window.location.href = `result.html?search=${encodeURIComponent(query)}`;
            }
        }
    });

    // ฟังก์ชันเปิดกล้อง (อันนี้ของเดิมนายมีอยู่แล้ว เรียกใช้ได้เลย)
    function openCamera() {
        console.log("เปิดกล้อง AI สแกนปลา!");
        // โค้ดเรียกกล้องของนายใส่ตรงนี้...
    }
</script>
</head>
<body>

<div class="app-container">
    <div class="header-title">AquaSmart Search</div>

    <!-- กล่องค้นหา -->
    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="พิมพ์ชื่อปลา... เช่น ปลาช่อน">
        <button id="searchButton" class="btn-primary" style="flex: 0 0 auto; padding: 12px 20px;">ค้นหา</button>
    </div>

    <!-- แจ้งเตือนเมื่อไม่พบข้อมูล -->
    <div id="errorMessage">❌ ไม่พบข้อมูลปลาที่คุณค้นหา</div>

    <!-- พื้นที่แสดงผลลัพธ์ -->
    <div id="resultArea" style="display: none;">
        <div class="card image-card">
            <img id="fishImage" src="" alt="Fish Image">
        </div>

        <div class="card">
            <div class="title-header">
                <h2 id="fishTitle">ชื่อปลา</h2>
                <div id="fishCategoryBadge" class="status-tag">Match</div>
            </div>
            <p id="fishDescription" class="description">คำอธิบาย</p>
        </div>

        <div class="card">
            <h3 class="section-title">General Information</h3>
            
            <div class="info-grid">
                <div class="info-box">
                    <h4>Type</h4>
                    <p id="fishType">-</p>
                </div>
                <div class="info-box">
                    <h4>Category</h4>
                    <p id="fishCategory">-</p>
                </div>
                <div class="info-box">
                    <h4>Habitat</h4>
                    <p id="fishHabitat">-</p>
                </div>
            </div>

            <div class="identify-box">
                <h4>How to Identify</h4>
                <p id="fishIdentify">-</p>
            </div>
        </div>

        <div class="card">
            <h3 class="section-title">More Action</h3>
            <div class="action-row">
                <button class="btn-primary" style="flex: 1; z-index: 1;">View Full Details</button>
                <button class="btn-icon">
                    <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- เมนูด้านล่างสุด -->
    <div class="bottom-nav">
        <div class="nav-item active"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg></div>
        <div class="nav-item"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
        <div class="nav-item"><svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg></div>
    </div>
</div>

<script>
    const fishDatabase = {
        "ปลาช่อน": {
            title: "ปลาช่อน (Snakehead)",
            image: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a2/Channa_striata_G1.jpg/800px-Channa_striata_G1.jpg",
            description: "ปลาน้ำจืดเศรษฐกิจยอดนิยม เนื้อแน่น อร่อย มีความทนทานสูง สามารถฮุบอากาศหายใจได้โดยตรง",
            type: "Freshwater",
            category: "Economic",
            habitat: "SE Asia",
            identify: "หัวคล้ายงู ลำตัวกลมยาว มีเกล็ดสีดำหรือน้ำตาลเข้ม มีลายพาดเฉียงจางๆ"
        },
        "ปลาดุก": {
            title: "ปลาดุก (Catfish)",
            image: "https://upload.wikimedia.org/wikipedia/commons/thumb/6/69/Clarias_batrachus_01.jpg/800px-Clarias_batrachus_01.jpg",
            description: "ปลาไม่มีเกล็ดที่ทนทานต่อน้ำขุ่นข้น เลี้ยงง่าย โตไว นิยมนำมาย่าง ทำปลาดุกฟู หรือแกง",
            type: "Freshwater",
            category: "Economic",
            habitat: "SE Asia",
            identify: "ไม่มีเกล็ด ลำตัวยาว หัวแบนกว้าง มีหนวด 4 คู่รอบปาก ครีบหลังและครีบก้นยาว"
        },
        "ปลากระดี่": {
            title: "ปลากระดี่ (Gourami)",
            image: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cf/Trichopodus_trichopterus_-_01.jpg/800px-Trichopodus_trichopterus_-_01.jpg",
            description: "ปลาน้ำจืดขนาดเล็ก นิยมนำมาทำปลาร้าหรือปลาแห้ง บางชนิดที่มีสีสันสวยงามนิยมนำมาเลี้ยงตู้",
            type: "Freshwater",
            category: "Economic",
            habitat: "Asia",
            identify: "ลำตัวแบนข้าง รูปไข่ มีครีบอกเป็นเส้นก้านยาวคล้ายหนวด 1 คู่ยื่นออกมาชัดเจน"
        },
        "ปลากุเล้า": {
            title: "ปลากุเล้า (Fourfinger Threadfin)",
            image: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Eleutheronema_tetradactylum.jpg/800px-Eleutheronema_tetradactylum.jpg",
            description: "ปลาทะเลและน้ำกร่อย เนื้อละเอียด รสชาติดีเยี่ยม นิยมนำมาทำปลากุเลาเค็มที่ได้ชื่อว่าเป็น 'ราชาปลาเค็ม'",
            type: "Marine / Brackish",
            category: "Economic",
            habitat: "Coastal",
            identify: "ลำตัวยาวแบนข้าง ปากกว้าง ครีบอกมีก้านครีบอิสระยื่นยาวออกมาเป็นเส้น 4 เส้นใต้เหงือก"
        },
        "ปลานวลจันทร์": {
            title: "ปลานวลจันทร์ (Bangus)",
            image: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0a/Chanos_chanos.jpg/800px-Chanos_chanos.jpg",
            description: "หรือปลา Milkfish ปลาเศรษฐกิจสำคัญ ทานตะไคร่น้ำเป็นอาหาร เลี้ยงง่าย นิยมมากในฟิลิปปินส์และไต้หวัน",
            type: "Marine / Fresh",
            category: "Economic",
            habitat: "Indo-Pacific",
            identify: "ลำตัวเพรียวยาวแบนข้าง เกล็ดสีเงินแวววาว ตากลมโตและมีเยื่อใสคลุมตา ปากเล็กไม่มีฟัน"
        },
        "ปลาทอง": {
            title: "ปลาทอง (Gold Fish)",
            image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/e9/Goldfish3.jpg/800px-Goldfish3.jpg",
            description: "ปลาสวยงามยอดนิยมอันดับต้นๆ ของโลก เลี้ยงง่าย มีหลายสายพันธุ์และถูกพัฒนาให้มีสีสันหลากหลาย",
            type: "Freshwater",
            category: "Ornamental",
            habitat: "Aquarium",
            identify: "ลำตัวอ้วนป้อม สีสันสดใส (ส้ม, แดง, ขาว, ดำ) บางพันธุ์มีวุ้นที่หัวหรือตาโปนออกมาชัดเจน"
        },
        "ปลาปั้กเป้าเขียวจุด": {
            title: "ปลาปั้กเป้าเขียวจุด (Green Spotted Puffer)",
            image: "https://upload.wikimedia.org/wikipedia/commons/thumb/e/ef/Tetraodon_nigroviridis.jpg/800px-Tetraodon_nigroviridis.jpg",
            description: "ปลาปักเป้าขนาดเล็ก สีสันสวยงามแต่นิสัยดุร้าย ชอบกินหอยและกุ้ง นิยมเลี้ยงในตู้น้ำกร่อย",
            type: "Brackish / Fresh",
            category: "Ornamental",
            habitat: "SE Asia",
            identify: "พื้นลำตัวส่วนบนสีเขียวตองอ่อน มีจุดสีดำกระจายทั่วตัว ท้องสีขาว สามารถพองตัวได้เมื่อตกใจ"
        },
        "ปลาหมอจากัวร์": {
            title: "ปลาหมอจากัวร์ (Jaguar Guapote)",
            image: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/23/Parachromis_managuensis_-_Jaguar_cichlid.jpg/800px-Parachromis_managuensis_-_Jaguar_cichlid.jpg",
            description: "ปลาหมอสีขนาดใหญ่ นิสัยก้าวร้าว หวงถิ่น มีลวดลายที่สวยงามดุดันคล้ายลายของเสือจากัวร์",
            type: "Freshwater",
            category: "Ornamental",
            habitat: "Central America",
            identify: "ลำตัวแบนข้าง ปากกว้าง พื้นลำตัวเหลือบทองหรือเงิน มีจุดและลวดลายสีดำกระจายหนาแน่นทั่วตัว"
        },
        "ปลาเสือข้างลาย": {
            title: "ปลาเสือข้างลาย (Black Spotted Barb)",
            image: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Puntigrus_tetrazona.jpg/800px-Puntigrus_tetrazona.jpg",
            description: "ปลาน้ำจืดขนาดเล็ก นิสัยตื่นตัว มักอยู่รวมกันเป็นฝูง นิยมเลี้ยงในตู้ไม้น้ำเพื่อเพิ่มความมีชีวิตชีวา",
            type: "Freshwater",
            category: "Ornamental",
            habitat: "SE Asia",
            identify: "ลำตัวแบนข้าง พื้นลำตัวสีเงินอมเหลืองหรือส้ม มีแถบสีดำพาดขวางลำตัวเป็นแนวตั้งอย่างชัดเจน"
        },
        "ปลากราย": {
            title: "ปลากราย (Knifefish)",
            image: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Chitala_ornata_01.jpg/800px-Chitala_ornata_01.jpg",
            description: "ปลารูปร่างแปลกตา ตอนเล็กนิยมเลี้ยงตู้สวยงาม แต่เมื่อโตเต็มที่นิยมนำมาทำลูกชิ้นและทอดมันปลากราย",
            type: "Freshwater",
            category: "Ornamental / Economic",
            habitat: "SE Asia",
            identify: "ลำตัวแบนข้างมากคล้ายมีด ครีบก้นยาวติดกับครีบหาง มีจุดสีดำขอบขาวเรียงกันเป็นแถวเหนือฐานครีบก้น"
        }
    };

    const searchButton = document.getElementById('searchButton');
    const searchInput = document.getElementById('searchInput');
    const errorMessage = document.getElementById('errorMessage');
    const resultArea = document.getElementById('resultArea');
    const fishCategoryBadge = document.getElementById('fishCategoryBadge');

    function performSearch() {
        const query = searchInput.value.trim(); 
        const result = fishDatabase[query];

        if (query === "") {
            errorMessage.innerText = "⚠️ กรุณาพิมพ์ชื่อปลาก่อนค้นหา";
            errorMessage.style.display = 'block';
            resultArea.style.display = 'none';
            return;
        }

        if (result) {
            errorMessage.style.display = 'none';
            resultArea.style.display = 'block';
            
            document.getElementById('fishTitle').innerText = result.title;
            document.getElementById('fishImage').src = result.image;
            document.getElementById('fishDescription').innerText = result.description;
            document.getElementById('fishType').innerText = result.type;
            document.getElementById('fishCategory').innerText = result.category;
            document.getElementById('fishHabitat').innerText = result.habitat;
            document.getElementById('fishIdentify').innerText = result.identify;

            if(result.category.includes("Ornamental")) {
                fishCategoryBadge.innerText = "ปลาสวยงาม";
                fishCategoryBadge.className = "status-tag ornamental";
            } else {
                fishCategoryBadge.innerText = "ปลาเศรษฐกิจ";
                fishCategoryBadge.className = "status-tag";
            }

        } else {
            errorMessage.innerText = `❌ ไม่พบข้อมูลของ "${query}" ในระบบ`;
            errorMessage.style.display = 'block';
            resultArea.style.display = 'none';
        }
    }

    searchButton.addEventListener('click', performSearch);
    searchInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            performSearch();
        }
    });

    searchInput.value = "ปลาทอง";
    performSearch();
    searchInput.value = "";
</script>

</body>
</html>
