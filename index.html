<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSmart ML - Kure</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        @keyframes progress { 0% { left: -50%; } 100% { left: 100%; } }
        .animate-progress { position: relative; animation: progress 1.5s infinite linear; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center p-4">
    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden mt-4">
        <div class="bg-gradient-to-r from-blue-600 to-cyan-500 p-8 text-white text-center">
            <h1 class="text-3xl font-black italic tracking-tighter">AQUASMART ML</h1>
            <p class="opacity-80 text-xs mt-1 uppercase">AI Fish Analyzer V2 by Kure</p>
        </div>
        
        <div class="p-6">
            <div id="upload-box" class="border-4 border-dashed border-blue-100 rounded-[2rem] p-10 text-center bg-blue-50 cursor-pointer hover:bg-blue-100 transition-all">
                <input type="file" id="imageInput" accept="image/*" class="hidden">
                <label for="imageInput" class="cursor-pointer block">
                    <span class="text-6xl block mb-4">🐠</span>
                    <p class="text-blue-600 font-bold">เลือกรูปปลาเพื่อสแกน</p>
                </label>
            </div>

            <div id="loading" class="hidden text-center my-10">
                <div class="h-2 w-full bg-blue-100 rounded-full overflow-hidden relative">
                    <div class="h-full bg-blue-600 w-1/2 animate-progress absolute"></div>
                </div>
                <p class="mt-4 text-blue-500 font-medium italic text-sm">กำลังสแกนสายพันธุ์...</p>
            </div>

            <div id="result" class="hidden mt-4">
                <div class="bg-white border-2 border-blue-50 rounded-[2rem] p-6 shadow-sm">
                    <div class="flex justify-between items-center mb-4 border-b pb-4">
                        <h2 id="fishName" class="text-3xl font-bold text-slate-800">ชื่อปลา</h2>
                        <span id="prob" class="bg-green-500 text-white px-3 py-1 rounded-xl text-xs font-black">0%</span>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Description</span>
                            <p id="desc" class="text-slate-600 text-sm leading-relaxed mt-1">รายละเอียด...</p>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="bg-blue-50 p-3 rounded-2xl">
                                <span class="text-[10px] font-black text-blue-400 uppercase">Category</span>
                                <p id="cat" class="text-blue-900 font-bold text-xs mt-1">ประเภท</p>
                            </div>
                            <div class="bg-amber-50 p-3 rounded-2xl">
                                <span class="text-[10px] font-black text-amber-400 uppercase">Advice</span>
                                <p id="tips" class="text-amber-900 font-bold text-xs mt-1">คำแนะนำ</p>
                            </div>
                        </div>
                    </div>
                </div>
                <button onclick="location.reload()" class="w-full mt-6 py-4 bg-slate-100 text-slate-400 font-black rounded-2xl uppercase hover:bg-slate-200 transition-all">Scan Again</button>
            </div>
        </div>
    </div>
    <p class="mt-8 text-gray-300 text-[10px] font-bold tracking-widest uppercase">RMUTT • COMPUTER ENGINEERING</p>

    <script>
        let model;
        // เช็กลำดับปลาให้ตรงกับตอนเทรนใน Kaggle ด้วยนะ!
        const fishList = ['ปลาดุก', 'ปลากราย', 'ปลาทอง', 'ปลากระดี่', 'ปลาปักเป้าเขียวจุด', 'ปลาหมอจากัวร์', 'ปลานวลจันทร์', 'ปลาช่อน', 'ปลากุเลา', 'ปลาเสือข้างลาย'];

        async function init() {
            try {
                // ไฟล์สมบูรณ์แล้ว โหลดตรงๆ ได้เลย
                model = await tf.loadLayersModel('./model.json');
                console.log("AI Ready!");
            } catch (err) {
                console.error(err);
                alert("AI Error: " + err.message);
            }
        }

        document.getElementById('imageInput').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            document.getElementById('upload-box').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = async () => {
                // เข้าสู่กระบวนการทำนายผล
                const tensor = tf.tidy(() => {
                    let t = tf.browser.fromPixels(img);
                    t = tf.image.resizeBilinear(t, [224, 224]);
                    // ค่าสี 0-1 ตรงกับตอนเทรนใน Kaggle 
                    return t.toFloat().div(255.0).expandDims(0);
                });
                
                const prediction = await model.predict(tensor).data();
                const idx = prediction.indexOf(Math.max(...prediction));
                const maxProb = (prediction[idx] * 100).toFixed(1);
                
                console.log("คะแนน:", prediction); // แอบดูคะแนนใน F12 ได้
                
                try {
                    const res = await fetch('./fish_data.json');
                    const db = await res.json();
                    const name = fishList[idx];

                    document.getElementById('fishName').innerText = name;
                    document.getElementById('prob').innerText = maxProb + "%";
                    
                    if(db[name]) {
                        document.getElementById('desc').innerText = db[name].description || "-";
                        document.getElementById('cat').innerText = db[name].category || "-";
                        document.getElementById('tips').innerText = db[name].tips || "-";
                    } else {
                        document.getElementById('desc').innerText = "รออัปเดตข้อมูล";
                    }
                } catch(e) {
                    document.getElementById('fishName').innerText = fishList[idx];
                    document.getElementById('desc').innerText = "(ไม่พบไฟล์ fish_data.json)";
                }

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result').classList.remove('hidden');
            };
        };
        init();
    </script>
</body>
</html>
