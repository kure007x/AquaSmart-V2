<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSmart ML - Kure</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center p-4">
    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden mt-4">
        <div class="bg-blue-600 p-8 text-white text-center shadow-lg">
            <h1 class="text-3xl font-black italic">AquaSmart ML</h1>
            <p class="opacity-80 text-xs mt-1">วิเคราะห์สายพันธุ์ปลา 10 ชนิด (V2)</p>
        </div>
        
        <div class="p-6">
            <div id="upload-box" class="border-4 border-dashed border-blue-100 rounded-3xl p-10 text-center bg-blue-50 cursor-pointer hover:bg-blue-100 transition-all">
                <input type="file" id="imageInput" accept="image/*" class="hidden">
                <label for="imageInput" class="cursor-pointer">
                    <span class="text-6xl">📸</span>
                    <p class="mt-4 text-blue-600 font-bold">เลือกรูปปลาเพื่อเริ่มสแกน</p>
                </label>
            </div>

            <div id="loading" class="hidden text-center my-8 animate-pulse">
                <div class="h-1 w-full bg-blue-100 rounded-full overflow-hidden">
                    <div class="h-full bg-blue-600 w-1/2 animate-[progress_2s_infinite]"></div>
                </div>
                <p class="mt-4 text-blue-500 font-medium italic text-sm">AI กำลังวิเคราะห์ผล...</p>
            </div>

            <div id="result" class="hidden mt-6">
                <div class="bg-gradient-to-br from-blue-50 to-white rounded-3xl p-6 border border-blue-100 shadow-sm">
                    <div class="flex justify-between items-start">
                        <h2 id="fishName" class="text-3xl font-bold text-blue-900">ชื่อปลา</h2>
                        <span id="prob" class="bg-blue-600 text-white px-3 py-1 rounded-xl text-xs font-bold shadow-md">0%</span>
                    </div>
                    <p id="cat" class="text-blue-500 text-sm font-bold mt-1 italic">ประเภท</p>
                    <div class="mt-6 space-y-4">
                        <p id="desc" class="text-gray-600 text-sm leading-relaxed">รายละเอียด...</p>
                        <div class="bg-amber-50 rounded-2xl p-4 border border-amber-100">
                            <p class="text-xs font-bold text-amber-700">💡 คำแนะนำ:</p>
                            <p id="tips" class="text-amber-900 text-xs mt-1">ข้อควรระวัง</p>
                        </div>
                    </div>
                </div>
                <button onclick="location.reload()" class="w-full mt-6 py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold hover:bg-gray-200 active:scale-95 transition-all">เริ่มสแกนใหม่</button>
            </div>
        </div>
    </div>
    <p class="mt-8 text-gray-400 text-[10px] font-medium tracking-widest uppercase text-center">Project AquaSmart-V2 • by Kure</p>

    <script>
        let model;
        // รายชื่อปลาตามลำดับความมั่นใจของโมเดล
        const fishList = ['ปลาดุก', 'ปลากราย', 'ปลาทอง', 'ปลากระดี่', 'ปลาปักเป้าเขียวจุด', 'ปลาหมอจากัวร์', 'ปลานวลจันทร์', 'ปลาช่อน', 'ปลากุเลา', 'ปลาเสือข้างลาย'];

        async function init() {
            try {
                // เรียกไฟล์ model.json จากโฟลเดอร์เดียวกัน
                model = await tf.loadLayersModel('./model.json');
                console.log("AI Ready!");
            } catch (err) { 
                alert("AI ฟ้องว่า: " + err.message); 
            }
        }

        document.getElementById('imageInput').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;

            document.getElementById('upload-box').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            const img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            img.onload = async () => {
                const tensor = tf.browser.fromPixels(img)
                    .resizeNearestNeighbor([224, 224])
                    .toFloat()
                    .div(tf.scalar(255))
                    .expandDims();
                
                const prediction = await model.predict(tensor).data();
                const idx = prediction.indexOf(Math.max(...prediction));
                
                // ดึงข้อมูลจากไฟล์ fish_data.json
                try {
                    const res = await fetch('./fish_data.json');
                    const db = await res.json();
                    const name = fishList[idx];

                    document.getElementById('fishName').innerText = name;
                    document.getElementById('prob').innerText = (prediction[idx]*100).toFixed(1) + "%";
                    document.getElementById('desc').innerText = db[name].description;
                    document.getElementById('cat').innerText = db[name].category;
                    document.getElementById('tips').innerText = db[name].tips;
                } catch(e) {
                    console.error("Fish data not found");
                }

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result').classList.remove('hidden');
            };
        };
        init();
    </script>
</body>
</html>
