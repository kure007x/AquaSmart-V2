<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSmart ML - Kure</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-100 min-h-screen flex flex-col items-center p-4">
    <div class="fixed top-4 right-4 z-50">
        <button onclick="toggleLang()" class="bg-white/90 backdrop-blur-md px-4 py-2 rounded-full shadow-lg font-bold text-blue-600 border border-blue-100 hover:scale-105 transition-all">
            <span id="lang-label">TH | EN 🌐</span>
        </button>
    </div>

    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden mt-4">
        <div class="bg-gradient-to-r from-blue-600 to-cyan-500 p-8 text-white text-center">
            <h1 id="ui-title" class="text-3xl font-black italic tracking-tighter">AQUASMART ML</h1>
            <p id="ui-subtitle" class="opacity-80 text-xs mt-1 uppercase">AI Fish Analyzer V2</p>
        </div>
        
        <div class="p-6">
            <div id="upload-box" class="border-4 border-dashed border-blue-100 rounded-[2rem] p-10 text-center bg-blue-50 cursor-pointer">
                <input type="file" id="imageInput" accept="image/*" class="hidden">
                <label for="imageInput" class="cursor-pointer block">
                    <span class="text-6xl block mb-4">📸</span>
                    <p id="ui-select" class="text-blue-600 font-bold">เลือกรูปปลาเพื่อสแกน</p>
                </label>
            </div>

            <div id="loading" class="hidden text-center my-10">
                <p id="ui-scanning" class="mt-4 text-blue-500 font-medium italic text-sm">กำลังสแกน...</p>
            </div>

            <div id="result" class="hidden mt-4">
                <div class="bg-white border-2 border-blue-50 rounded-[2rem] p-6 shadow-sm">
                    <div class="flex justify-between items-center mb-4 border-b pb-4">
                        <h2 id="fishName" class="text-3xl font-bold text-slate-800">-</h2>
                        <span id="prob" class="bg-green-500 text-white px-3 py-1 rounded-xl text-xs font-black">0%</span>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <span id="ui-desc-tag" class="text-[10px] font-black text-blue-400 uppercase tracking-widest">รายละเอียด</span>
                            <p id="desc" class="text-slate-600 text-sm mt-1">-</p>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="bg-blue-50 p-3 rounded-2xl">
                                <span id="ui-cat-tag" class="text-[10px] font-black text-blue-400 uppercase">ประเภท</span>
                                <p id="cat" class="text-blue-900 font-bold text-xs mt-1">-</p>
                            </div>
                            <div class="bg-amber-50 p-3 rounded-2xl">
                                <span id="ui-tips-tag" class="text-[10px] font-black text-amber-400 uppercase">คำแนะนำ</span>
                                <p id="tips" class="text-amber-900 font-bold text-xs mt-1">-</p>
                            </div>
                        </div>
                    </div>
                </div>
                <button onclick="location.reload()" id="ui-retry" class="w-full mt-6 py-4 bg-slate-100 text-slate-400 font-black rounded-2xl uppercase">เริ่มใหม่</button>
            </div>
        </div>
    </div>

    <script>
        let model;
        let currentLang = 'th';
        const fishList = ['ปลานวลจันทร์', 'ปลาเสือข้างลาย', 'ปลาดุก', 'ปลากุเลา', 'ปลาทอง', 'ปลากระดี่', 'ปลาปักเป้าเขียวจุด', 'ปลาหมอจากัวร์', 'ปลากราย', 'ปลาช่อน'];

        const uiText = {
            th: { title: "AQUASMART ML", subtitle: "ระบบวิเคราะห์ปลา V2", select: "เลือกรูปปลาเพื่อสแกน", scanning: "กำลังสแกน...", desc: "รายละเอียด", cat: "ประเภท", tips: "คำแนะนำ", retry: "เริ่มใหม่" },
            en: { title: "AQUASMART ML", subtitle: "Fish Analyzer V2", select: "Select photo to scan", scanning: "Scanning...", desc: "Description", cat: "Category", tips: "Advice", retry: "Scan Again" }
        };

        function toggleLang() {
            currentLang = currentLang === 'th' ? 'en' : 'th';
            document.getElementById('ui-title').innerText = uiText[currentLang].title;
            document.getElementById('ui-subtitle').innerText = uiText[currentLang].subtitle;
            document.getElementById('ui-select').innerText = uiText[currentLang].select;
            document.getElementById('ui-scanning').innerText = uiText[currentLang].scanning;
            document.getElementById('ui-desc-tag').innerText = uiText[currentLang].desc;
            document.getElementById('ui-cat-tag').innerText = uiText[currentLang].cat;
            document.getElementById('ui-tips-tag').innerText = uiText[currentLang].tips;
            document.getElementById('ui-retry').innerText = uiText[currentLang].retry;
            // ถ้ามีผลลัพธ์ค้างอยู่ ให้รีเฟรชการแสดงผลด้วย
            if(!document.getElementById('result').classList.contains('hidden')) updateResult();
        }

        async function init() {
            model = await tf.loadGraphModel('./model.json');
            console.log("Model Loaded");
        }

        let lastPredictionIdx = -1;
        let lastProb = 0;

        document.getElementById('imageInput').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            document.getElementById('upload-box').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            const img = new Image();
            img.src = URL.createObjectURL(file);
            img.onload = async () => {
                const tensor = tf.tidy(() => {
                    let t = tf.browser.fromPixels(img);
                    t = tf.image.resizeBilinear(t, [224, 224]);
                    return t.toFloat().div(255.0).expandDims(0);
                });
                const pred = await model.predict(tensor).data();
                lastPredictionIdx = pred.indexOf(Math.max(...pred));
                lastProb = (pred[lastPredictionIdx] * 100).toFixed(1);
                updateResult();
            };
        };

        async function updateResult() {
            const res = await fetch('./fish_data.json');
            const db = await res.json();
            const fishThName = fishList[lastPredictionIdx];
            const data = db[fishThName];

            if(currentLang === 'th') {
                document.getElementById('fishName').innerText = fishThName;
                document.getElementById('desc').innerText = data.description;
                document.getElementById('cat').innerText = data.category;
                document.getElementById('tips').innerText = data.tips;
            } else {
                document.getElementById('fishName').innerText = data.en_name;
                document.getElementById('desc').innerText = data.description_en;
                document.getElementById('cat').innerText = data.category_en;
                document.getElementById('tips').innerText = data.tips_en;
            }
            document.getElementById('prob').innerText = lastProb + "%";
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
