<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSmart-V2 | AI สแกนปลา</title>
    <!-- ใช้ Tailwind CSS แบบ CDN ไปก่อนสำหรับการทดสอบ -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 p-6 font-sans">
    
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-3xl font-bold text-blue-600 text-center mb-6">🐟 AquaSmart-V2 AI Scanner</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- 📷 คอลัมน์ซ้าย: ส่วนกล้อง AI -->
            <div class="flex flex-col items-center border-2 border-dashed border-blue-300 p-6 rounded-lg bg-blue-50">
                <button id="startBtn" onclick="init()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg mb-4 shadow-md transition duration-300">
                    📸 กดเปิดกล้องสแกนปลา
                </button>
                <!-- กล่องใส่ภาพจากกล้อง -->
                <div id="webcam-container" class="w-full flex justify-center overflow-hidden rounded-lg"></div>
                <!-- กล่องแสดง % ความมั่นใจ -->
                <div id="label-container" class="mt-4 font-bold text-gray-700 bg-white px-4 py-2 rounded shadow-sm w-full text-center">รอการเปิดกล้อง...</div>
            </div>

            <!-- 📊 คอลัมน์ขวา: ส่วนแสดงผลจาก Firebase -->
            <div class="flex flex-col items-center justify-start border p-6 rounded-lg bg-gray-50 shadow-inner">
                <h2 class="text-xl font-bold text-gray-800 mb-4 border-b-2 border-blue-200 pb-2 w-full text-center">ข้อมูลปลาที่พบ</h2>
                
                <img id="showFishImage" src="https://via.placeholder.com/300x200?text=รอสแกนรูปปลา" alt="Fish Image" class="w-full h-48 object-cover rounded-lg mb-4 shadow-md bg-gray-200">
                
                <h3 id="showFishNameTH" class="text-2xl font-bold text-blue-700 mb-2">ยังไม่พบข้อมูล</h3>
                <p id="showFishDesc" class="text-gray-600 text-center text-sm leading-relaxed">
                    กรุณาหันกล้องไปที่รูปปลา เมื่อ AI มั่นใจเกิน 80% ข้อมูลจากฐานข้อมูลจะปรากฏที่นี่...
                </p>
            </div>

        </div>
    </div>

    <!-- ========================================== -->
    <!-- 1. โหลดไลบรารี Teachable Machine -->
    <!-- ========================================== -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <!-- ========================================== -->
    <!-- 2. โค้ด Teachable Machine (ระบบสแกน) -->
    <!-- ========================================== -->
    <script type="text/javascript">
        // 🚨 กูเร่! อย่าลืมเอาลิงก์โมเดล AI ของนายมาใส่ตรงนี้นะ! (ที่ลงท้ายด้วย /)
        const URL = "https://teachablemachine.withgoogle.com/models/ใส่ลิงก์โมเดลของนาย/";
        
        let model, webcam, labelContainer, maxPredictions;
        let lastScannedFish = ""; // ตัวแปรกันไม่ให้โหลดข้อมูลซ้ำรัวๆ

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            document.getElementById("startBtn").innerText = "⏳ กำลังเปิดกล้อง...";
            document.getElementById("startBtn").disabled = true;

            // โหลดโมเดล
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // ตั้งค่ากล้อง
            const flip = true; 
            webcam = new tmImage.Webcam(300, 300, flip); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            // เอากล้องยัดลงหน้าเว็บ
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            document.getElementById("startBtn").style.display = "none";
        }

        async function loop() {
            webcam.update(); // อัปเดตเฟรมภาพ
            await predict(); // ทายผล
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const predictions = await model.predict(webcam.canvas);
            
            let highestProb = 0;
            let bestMatch = "";

            // วนลูปหาว่าตอนนี้ AI มั่นใจว่าเป็นปลาตัวไหนมากที่สุด
            for (let i = 0; i < maxPredictions; i++) {
                if (predictions[i].probability > highestProb) {
                    highestProb = predictions[i].probability;
                    bestMatch = predictions[i].className;
                }
            }

            // โชว์ผลลัพธ์ว่ามั่นใจกี่ %
            labelContainer.innerText = `สแกนเจอ: ${bestMatch} (${Math.round(highestProb * 100)}%)`;

            // ⚡ เงื่อนไขสำคัญ: มั่นใจ > 80% และไม่ใช่ปลาตัวเดิม ถึงจะไปดึงฐานข้อมูล
            if (highestProb > 0.80 && bestMatch !== lastScannedFish) {
                lastScannedFish = bestMatch; // จำชื่อปลาไว้ จะได้ไม่โหลดซ้ำ
                
                // เรียกใช้ฟังก์ชัน Firebase ดึงข้อมูล
                if(window.fetchFishDataFromFirebase) {
                    window.fetchFishDataFromFirebase(bestMatch);
                }
            }
        }
    </script>

    <!-- ========================================== -->
    <!-- 3. โค้ด Firebase (ระบบดึงข้อมูลมาแสดง) -->
    <!-- ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // 🚨 กูเร่! เอา API Key ของโปรเจกต์นายมาใส่ตรงนี้
        const firebaseConfig = {
            apiKey: "ใส่_API_KEY_ของนายตรงนี้", 
            authDomain: "aquasmart-v2.firebaseapp.com",
            projectId: "aquasmart-v2",
            storageBucket: "aquasmart-v2.firebasestorage.app",
            messagingSenderId: "482478104079",
            appId: "ใส่_APP_ID_ของนายตรงนี้"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // สร้างฟังก์ชันไว้ให้โค้ด AI ด้านบนเรียกใช้
        window.fetchFishDataFromFirebase = async function(predictedClassName) {
            try {
                console.log("🔍 กำลังดึงข้อมูล Firebase ของ ID: " + predictedClassName);
                
                // วิ่งไปหาข้อมูลในคอลเลกชัน fish_info
                const docRef = doc(db, "fish_info", predictedClassName);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const fishData = docSnap.data();
                    console.log("✅ เจอข้อมูลปลาแล้ว!", fishData);
                    
                    // อัปเดตข้อมูลบนหน้าเว็บ
                    document.getElementById("showFishNameTH").innerText = fishData.thai_name;
                    document.getElementById("showFishDesc").innerText = fishData.description;
                    document.getElementById("showFishImage").src = fishData.image_url;
                } else {
                    console.log("❌ ไม่พบประวัติปลาชนิดนี้ในระบบ");
                    document.getElementById("showFishNameTH").innerText = "ปลาชนิดนี้ยังไม่มีในระบบ";
                    document.getElementById("showFishDesc").innerText = "กรุณาเพิ่มข้อมูลปลา " + predictedClassName + " ในหน้า Admin ก่อนครับ";
                    document.getElementById("showFishImage").src = "https://via.placeholder.com/300x200?text=ไม่มีรูปภาพในฐานข้อมูล";
                }
            } catch (error) {
                console.error("🚨 เกิดข้อผิดพลาดในการเชื่อมต่อ Firebase:", error);
            }
        };
    </script>
</body>
</html>
